databases:
  - name: krypton-db
    databaseName: krypton_db
    plan: free

services:
  - type: web
    name: krypton-hub
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && npm install && npm run build && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: krypton-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
