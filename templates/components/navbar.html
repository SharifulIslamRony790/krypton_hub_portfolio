{% load static %}
<!-- 
  Krypton Hub 360 - Navbar Component
  Responsive top navigation with Alpine.js
-->
<header x-data="{ mobileMenuOpen: false, scrolled: false }" 
        @scroll.window="scrolled = (window.pageYOffset > 20)"
        :class="scrolled ? 'bg-primary/80 backdrop-blur-md shadow-sm border-b border-borderCustom' : 'bg-transparent border-b border-transparent'"
        class="fixed top-0 w-full z-50 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <a href="/" class="flex items-center">
                    <img class="h-10 w-auto" src="{% static 'icons/logo.svg' %}" alt="Krypton Hub Logo">
                </a>
            </div>

            <!-- Desktop Menu -->
            <nav class="hidden md:flex space-x-8">
                <a href="#about" class="text-textSecondary hover:text-textMain transition-colors text-sm font-medium">About</a>
                <a href="#team" class="text-textSecondary hover:text-textMain transition-colors text-sm font-medium">Team</a>
                <a href="#services" class="text-textSecondary hover:text-textMain transition-colors text-sm font-medium">Services</a>
                <a href="#process" class="text-textSecondary hover:text-textMain transition-colors text-sm font-medium">Process</a>
            </nav>

            <!-- CTA Button -->
            <div class="hidden md:flex items-center">
                <a href="#contact" class="bg-textMain text-primary px-5 py-2.5 rounded-md font-medium text-sm hover:bg-black transition-all flex items-center gap-2 group">
                    Build What's Next
                    <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>

            <!-- Mobile menu button -->
            <div class="flex md:hidden items-center">
                <button @click="mobileMenuOpen = !mobileMenuOpen" type="button" class="text-textMain hover:text-textSecondary p-2 focus:outline-none">
                    <span class="sr-only">Open main menu</span>
                    <i data-lucide="menu" x-show="!mobileMenuOpen" class="w-6 h-6"></i>
                    <i data-lucide="x" x-show="mobileMenuOpen" class="w-6 h-6" x-cloak></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="mobileMenuOpen" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-2"
         class="md:hidden bg-primary border-b border-borderCustom absolute w-full" x-cloak>
        <div class="px-4 pt-2 pb-6 space-y-1 shadow-lg">
            <a href="#about" @click="mobileMenuOpen = false" class="block px-3 py-3 rounded-md text-base font-medium text-textMain hover:bg-gray-50">About</a>
            <a href="#team" @click="mobileMenuOpen = false" class="block px-3 py-3 rounded-md text-base font-medium text-textMain hover:bg-gray-50">Team</a>
            <a href="#services" @click="mobileMenuOpen = false" class="block px-3 py-3 rounded-md text-base font-medium text-textMain hover:bg-gray-50">Services</a>
            <a href="#process" @click="mobileMenuOpen = false" class="block px-3 py-3 rounded-md text-base font-medium text-textMain hover:bg-gray-50">Process</a>
            <a href="#contact" @click="mobileMenuOpen = false" class="mt-4 w-full bg-textMain text-primary px-4 py-3 rounded-md text-center font-medium block">Let's Talk</a>
        </div>
    </div>
</header>
